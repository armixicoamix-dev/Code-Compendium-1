kind = "web"
previewPath = "/"
title = "Code Mentor"
version = "1.0.0"
id = "artifacts/code-mentor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21812

[services.development]
run = "pnpm --filter @workspace/code-mentor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-mentor", "run", "build" ]
publicDir = "artifacts/code-mentor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21812"
BASE_PATH = "/"
